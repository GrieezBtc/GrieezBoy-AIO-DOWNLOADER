<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GrieezBoy AIO Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg-body: #05070a;
  --bg-room: #020617;
  --text-primary: #f8fafc;
  --border-dim: #1e293b;
  --error: #ef4444;
  
  /* Brand Colors */
  --color-instagram: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  --color-facebook: #1877F2;
  --color-youtube: #FF0000;
  --color-tiktok: #fe2c55;
  --color-twitter: #1DA1F2;
  --color-threads: #ffffff;
  --color-pinterest: #E60023;
}

* { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

body, html {
  margin: 0; padding: 0; min-height: 100vh;
  background: var(--bg-body); color: var(--text-primary);
  display: flex; justify-content: center;
}

.room {
  width: 100%; max-width: 650px; background: var(--bg-room);
  padding: 40px 20px; min-height: 100vh;
  border-left: 1px solid var(--border-dim); border-right: 1px solid var(--border-dim);
}

h1 { text-align: center; font-size: 22px; letter-spacing: 2px; margin-bottom: 40px; color: #94a3b8; }

.media-list { display: flex; flex-direction: column; gap: 12px; }

.downloader-block {
  background: #0f172a; border: 1px solid var(--border-dim);
  padding: 20px; border-radius: 4px; cursor: pointer;
  transition: all 0.3s ease; position: relative;
}

.downloader-block.active { border-left: 6px solid var(--accent); }

.block-header { display: flex; justify-content: space-between; align-items: center; }
.block-title { font-weight: 700; font-size: 17px; text-transform: uppercase; }

/* Dynamic Titles Color */
[data-platform="Instagram"] { --accent: #dc2743; }
[data-platform="Facebook"] { --accent: #1877F2; }
[data-platform="YouTube"] { --accent: #FF0000; }
[data-platform="TikTok"] { --accent: #fe2c55; }
[data-platform="Twitter"] { --accent: #1DA1F2; }
[data-platform="Threads"] { --accent: #ffffff; }
[data-platform="Pinterest"] { --accent: #E60023; }

.block-title { color: var(--accent); }

.input-area { margin-top: 15px; display: none; padding-top: 15px; border-top: 1px solid #1e293b; }
.downloader-block.active .input-area { display: block; }

input {
  width: 100%; padding: 14px; background: #000; border: 1px solid #334155;
  color: white; border-radius: 4px; margin-bottom: 5px; outline: none;
}

input.invalid { border-color: var(--error) !important; }

.error-msg { color: var(--error); font-size: 12px; margin-bottom: 10px; display: none; }

/* --- BUTTON WITH SPINNER --- */
.btn-analyze {
  width: 100%; padding: 14px; color: white; border: none;
  font-weight: 800; cursor: pointer; border-radius: 4px;
  display: flex; justify-content: center; align-items: center; gap: 10px;
}

.spinner {
  width: 16px; height: 16px; border: 3px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%; border-top-color: #fff;
  animation: spin 0.8s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Button Colors */
[data-platform="Instagram"] .btn-analyze { background: var(--color-instagram); }
[data-platform="Facebook"] .btn-analyze  { background: var(--color-facebook); }
[data-platform="YouTube"] .btn-analyze   { background: var(--color-youtube); }
[data-platform="TikTok"] .btn-analyze    { background: var(--color-tiktok); }
[data-platform="Twitter"] .btn-analyze   { background: var(--color-twitter); }
[data-platform="Threads"] .btn-analyze   { background: #444; }
[data-platform="Pinterest"] .btn-analyze { background: var(--color-pinterest); }

/* IFRAME ENGINE STYLING */
.engine-container {
    margin-top: 15px;
    width: 100%;
    height: 400px;
    background: #000;
    border: 1px solid #334155;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    display: none;
    animation: slideIn 0.4s ease;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    position: relative;
    z-index: 1;
}

/* LOADING OVERLAY */
.loading-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #64748b;
    font-size: 14px;
    z-index: 2;
}

@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="room">
  <h1>GrieezBoy AIO Downloader</h1>

  <div class="media-list"></div>
</div>

<script>
/** * PASTE YOUR EXTERNAL DOWNLOADER LINKS BELOW 
 * Format: 'https://your-other-site.com/download?url='
 */
const platforms = [
    { name: 'Instagram', pattern: /instagram\.com/i, engineUrl: 'https://YOUR_INSTAGRAM_ENGINE_URL.com?url=' },
    { name: 'Facebook', pattern: /facebook\.com|fb\.watch/i, engineUrl: 'https://facebook-cyan-seven.vercel.app/?url=' },
    { name: 'YouTube', pattern: /youtube\.com|youtu\.be/i, 
    // Notice we removed "yt-engine.html" because it is now "index.html"
    engineUrl: 'https://youtube-downloader-ten-pied.vercel.app/?url=' },
    { name: 'TikTok', pattern: /tiktok\.com/i, engineUrl: 'https://tiktok-downloader-delta-lovat.vercel.app/?url=' },
    { name: 'Twitter', pattern: /twitter\.com|x\.com/i, engineUrl: 'https://twitter-downloader-indol.vercel.app/?url=' },
    { name: 'Threads', pattern: /threads\.net/i, engineUrl: 'https://thread-downloader-beryl.vercel.app/?url=' },
    { name: 'Pinterest', pattern: /pinterest\.com|pin\.it/i, engineUrl: 'https://YOUR_PINTEREST_ENGINE_URL.com?url=' }
];

const listContainer = document.querySelector('.media-list');

platforms.forEach(p => {
    const block = document.createElement('div');
    block.className = 'downloader-block';
    block.dataset.platform = p.name;
    block.innerHTML = `
        <div class="block-header">
            <span class="block-title">${p.name}</span>
            <small>Input Your Link Here</small>
        </div>
        <div class="input-area">
            <input type="text" placeholder="Paste ${p.name} link here..." onclick="event.stopPropagation()">
            <div class="error-msg">Please enter a valid ${p.name} URL</div>
            <button class="btn-analyze" onclick="handleProcess(this, '${p.name}')">
                <div class="spinner"></div>
                <span class="btn-text">Analyze & Download</span>
            </button>
            <div class="engine-container">
                <div class="loading-overlay">Loading...</div>
                <iframe src="about:blank"></iframe>
            </div>
        </div>
    `;
    
    block.onclick = () => {
        document.querySelectorAll('.downloader-block').forEach(b => b.classList.remove('active'));
        block.classList.add('active');
    };
    
    listContainer.appendChild(block);
});

function handleProcess(btn, platformName) {
    event.stopPropagation();
    const block = btn.closest('.downloader-block');
    const input = block.querySelector('input');
    const error = block.querySelector('.error-msg');
    const engineContainer = block.querySelector('.engine-container');
    const iframe = block.querySelector('iframe');
    const loadingOverlay = block.querySelector('.loading-overlay');
    const spinner = btn.querySelector('.spinner');
    const btnText = btn.querySelector('.btn-text');
    const platformData = platforms.find(p => p.name === platformName);

    // Reset UI
    input.classList.remove('invalid');
    error.style.display = 'none';
    engineContainer.style.display = 'none';
    iframe.src = "about:blank";

    // Validation
    if (!platformData.pattern.test(input.value)) {
        input.classList.add('invalid');
        error.style.display = 'block';
        return;
    }

    // UI Loading State
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Verifying...';
    
    setTimeout(() => {
        engineContainer.style.display = 'block';
        loadingOverlay.style.display = 'flex';
        
        // Load the external website
        iframe.src = platformData.engineUrl + encodeURIComponent(input.value);

        // Reset Button
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = `Analyze & Download`;

        // Hide overlay when iframe loads
        iframe.onload = () => {
            loadingOverlay.style.display = 'none';
        };
    }, 500);
}
</script>

</body>
</html>
