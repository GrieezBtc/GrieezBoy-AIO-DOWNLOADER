<style>
:root {
  /* Dark Mode (Default) */
  --bg-body: #05070a;
  --bg-room: #020617;
  --text-primary: #f8fafc;
  --text-dim: #94a3b8;
  --border-dim: #1e293b;
  --card-bg: #0f172a;
  --input-bg: #000;
  --error: #ef4444;
  
  --color-instagram: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  --color-facebook: #1877F2;
  --color-youtube: #FF0000;
  --color-tiktok: #fe2c55;
  --color-twitter: #1DA1F2;
  --color-threads: #ffffff;
  --color-pinterest: #E60023;
}

/* Light Mode Theme Overrides */
body.light-mode {
  --bg-body: #f1f5f9;
  --bg-room: #ffffff;
  --text-primary: #0f172a;
  --text-dim: #475569;
  --border-dim: #e2e8f0;
  --card-bg: #f8fafc;
  --input-bg: #ffffff;
}

/* Visibility Fix for Threads in Light Mode */
body.light-mode [data-platform="Threads"] .block-title {
    color: #0f172a !important; 
}

* { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; transition: background 0.3s ease, color 0.3s ease; }
body, html { margin: 0; padding: 0; min-height: 100vh; background: var(--bg-body); color: var(--text-primary); display: flex; flex-direction: column; align-items: center; }

/* TOP NAVIGATION BAR */
.top-nav {
    width: 100%; max-width: 650px; padding: 15px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-body); border-bottom: 1px solid var(--border-dim);
}

.nav-btn {
    background: rgba(148, 163, 184, 0.1); border: 1px solid var(--border-dim);
    color: var(--text-primary); padding: 8px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.install-btn { background: #3b82f6; color: white; border: none; }

.room { width: 100%; max-width: 650px; background: var(--bg-room); padding: 40px 20px; min-height: 100vh; border-left: 1px solid var(--border-dim); border-right: 1px solid var(--border-dim); display: flex; flex-direction: column; }
h1 { text-align: center; font-size: 22px; letter-spacing: 2px; margin-bottom: 40px; color: var(--text-dim); }
.media-list { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }

.downloader-block { background: var(--card-bg); border: 1px solid var(--border-dim); padding: 20px; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; position: relative; margin-bottom: 5px; }
.downloader-block.active { border-left: 6px solid var(--accent); }
.block-header { display: flex; justify-content: space-between; align-items: center; }
.block-title { font-weight: 700; font-size: 17px; text-transform: uppercase; }

[data-platform="Instagram"] { --accent: #dc2743; }
[data-platform="Facebook"] { --accent: #1877F2; }
[data-platform="YouTube"] { --accent: #FF0000; }
[data-platform="TikTok"] { --accent: #fe2c55; }
[data-platform="Twitter"] { --accent: #1DA1F2; }
[data-platform="Threads"] { --accent: #ffffff; }
[data-platform="Pinterest"] { --accent: #E60023; }
.block-title { color: var(--accent); }

.input-area { margin-top: 15px; display: none; padding-top: 15px; border-top: 1px solid var(--border-dim); }
.downloader-block.active .input-area { display: block; }

.input-wrapper { position: relative; margin-bottom: 10px; }
input { width: 100%; padding: 14px 80px 14px 14px; background: var(--input-bg); border: 1px solid var(--border-dim); color: var(--text-primary); border-radius: 4px; outline: none; }
.btn-paste { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--border-dim); color: var(--text-dim); border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-paste:hover { background: #334155; color: #fff; }

input.invalid { border-color: var(--error) !important; }
.error-msg { color: var(--error); font-size: 12px; margin-bottom: 10px; display: none; }

.btn-analyze { width: 100%; padding: 14px; color: white; border: none; font-weight: 800; cursor: pointer; border-radius: 4px; display: flex; justify-content: center; align-items: center; gap: 10px; }
.spinner { width: 16px; height: 16px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

[data-platform="Instagram"] .btn-analyze { background: var(--color-instagram); }
[data-platform="Facebook"] .btn-analyze  { background: var(--color-facebook); }
[data-platform="YouTube"] .btn-analyze   { background: var(--color-youtube); }
[data-platform="TikTok"] .btn-analyze    { background: var(--color-tiktok); }
[data-platform="Twitter"] .btn-analyze   { background: var(--color-twitter); }
[data-platform="Threads"] .btn-analyze   { background: #444; }
[data-platform="Pinterest"] .btn-analyze { background: var(--color-pinterest); }

.engine-container { margin-top: 15px; width: 100%; height: 400px; background: #000; border: 1px solid var(--border-dim); border-radius: 4px; position: relative; overflow: hidden; display: none; animation: slideIn 0.4s ease; }
iframe { width: 100%; height: 100%; border: none; position: relative; z-index: 1; }
.loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; color: #64748b; font-size: 14px; z-index: 2; }

footer { width: 100%; padding: 30px 10px; margin-top: 40px; text-align: center; background: rgba(15, 23, 42, 0.5); border-top: 1px solid var(--border-dim); }
.dev-label { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 15px; display: block; }
.social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
.social-links a { color: var(--text-dim); font-size: 22px; text-decoration: none; transition: all 0.3s ease; }
.social-links a:hover { transform: translateY(-3px); }
.social-links .fa-whatsapp:hover { color: #25D366; }
.social-links .fa-telegram:hover { color: #0088cc; }
.social-links .fa-instagram:hover { color: #E1306C; }
.social-links .fa-x-twitter:hover { color: var(--text-primary); }
.copyright { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn install-btn" id="pwaBtn">
        <i class="fa-solid fa-cloud-arrow-down"></i> Install App
    </button>
    <button class="nav-btn" onclick="toggleTheme()">
        <i class="fa-solid fa-moon" id="themeIcon"></i> <span id="themeText">Dark Mode</span>
    </button>
</div>

<div class="room">
  <h1>GRIEEZBOY DOWNLOADER</h1>
  <div class="media-list"></div>

  <footer>
      <span class="dev-label">CONNECT WITH DEVELOPER</span>
      <div class="social-links">
          <a href="https://wa.me/2348107461934" target="_blank" class="fa-brands fa-whatsapp"></a>

      </div>
      <div class="copyright">

      </div>

</div>

<script>
// --- PWA SERVICE WORKER REGISTRATION ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

let deferredPrompt;
const installBtn = document.getElementById('pwaBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    } else {
        alert("To install: Tap your browser menu (3 dots) and select 'Add to Home Screen'");
    }
});

const platforms = [
    { name: 'Instagram', pattern: /instagram\.com|instagr\.am/i, engineUrl: 'https://instagram-six-iota.vercel.app/?url=' },
    { name: 'Facebook', pattern: /facebook\.com|fb\.watch|fb\.com/i, engineUrl: 'https://facebook-cyan-seven.vercel.app/?url=' },
    { name: 'YouTube', pattern: /youtube\.com|youtu\.be/i, engineUrl: 'https://youtube-downloader-ten-pied.vercel.app/?url=' },
    { name: 'TikTok', pattern: /tiktok\.com/i, engineUrl: 'https://tiktok-downloader-delta-lovat.vercel.app/?url=' },
    { name: 'Twitter', pattern: /twitter\.com|x\.com/i, engineUrl: 'https://twitter-downloader-indol.vercel.app/?url=' },
    { name: 'Threads', pattern: /threads\.(net|com)/i, engineUrl: 'https://thread-downloader-beryl.vercel.app/?url=' },
    { name: 'Pinterest', pattern: /pinterest\.com|pin\.it/i, engineUrl: 'https://pinterest-seven-ashy.vercel.app/?url=' }
];

const listContainer = document.querySelector('.media-list');

platforms.forEach(p => {
    const block = document.createElement('div');
    block.className = 'downloader-block';
    block.dataset.platform = p.name;
    block.innerHTML = `
        <div class="block-header">
            <span class="block-title">${p.name}</span>
            <small style="color: #475569;">Tap to open</small>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" placeholder="Paste ${p.name} link here..." onclick="event.stopPropagation()">
                <button class="btn-paste" onclick="handlePaste(this)">PASTE</button>
            </div>
            <div class="error-msg" style="display:none;">Please enter a valid ${p.name} URL</div>
            <button class="btn-analyze" onclick="handleProcess(this, '${p.name}')">
                <div class="spinner"></div>
                <span class="btn-text">Analyze & Download</span>
            </button>
            <div class="engine-container">
                <div class="loading-overlay">Loading GrieezBoy Engine...</div>
                <iframe src="about:blank"></iframe>
            </div>
        </div>
    `;
    
    block.onclick = () => {
        const isActive = block.classList.contains('active');
        document.querySelectorAll('.downloader-block').forEach(b => b.classList.remove('active'));
        if(!isActive) block.classList.add('active');
    };
    
    listContainer.appendChild(block);
});

function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('themeIcon');
    const text = document.getElementById('themeText');
    
    body.classList.toggle('light-mode');
    
    if(body.classList.contains('light-mode')) {
        icon.className = 'fa-solid fa-sun';
        text.innerText = 'Light Mode';
    } else {
        icon.className = 'fa-solid fa-moon';
        text.innerText = 'Dark Mode';
    }
}

async function handlePaste(btn) {
    event.stopPropagation();
    const input = btn.closest('.input-wrapper').querySelector('input');
    try {
        const text = await navigator.clipboard.readText();
        input.value = text;
        btn.textContent = "DONE";
        setTimeout(() => btn.textContent = "PASTE", 1000);
    } catch (err) {
        alert("Please allow clipboard permissions!");
    }
}

function handleProcess(btn, platformName) {
    event.stopPropagation();
    const block = btn.closest('.downloader-block');
    const input = block.querySelector('input');
    const error = block.querySelector('.error-msg');
    const engineContainer = block.querySelector('.engine-container');
    const iframe = block.querySelector('iframe');
    const loadingOverlay = block.querySelector('.loading-overlay');
    const spinner = btn.querySelector('.spinner');
    const btnText = btn.querySelector('.btn-text');
    const platformData = platforms.find(p => p.name === platformName);

    input.classList.remove('invalid');
    error.style.display = 'none';
    engineContainer.style.display = 'none';
    iframe.src = "about:blank";

    if (!platformData.pattern.test(input.value)) {
        input.classList.add('invalid');
        error.style.display = 'block';
        return;
    }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Scanning...';
    
    setTimeout(() => {
        engineContainer.style.display = 'block';
        loadingOverlay.style.display = 'flex';
        iframe.src = platformData.engineUrl + encodeURIComponent(input.value);
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = `Analyze & Download`;
        iframe.onload = () => {
            loadingOverlay.style.display = 'none';
        };
    }, 500);
}
</script>
