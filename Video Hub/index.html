<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Hub</title>

<style>

body{
    background:#05070a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 16px;
    border-radius:12px;
    font-weight:bold;
}

.results{
    display:grid;
    gap:15px;
}

.card{
    background:#111827;
    border-radius:16px;
    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
}

.content{
    padding:12px;
}

.title{
    font-size:14px;
    font-weight:bold;
    margin-bottom:10px;
}

.meta{
    color:#94a3b8;
    font-size:12px;
    margin-bottom:12px;
}

.actions{
    display:flex;
    gap:10px;
}

.actions a{
    flex:1;
    text-align:center;
    text-decoration:none;
    padding:10px;
    border-radius:10px;
    color:white;
    font-size:13px;
    font-weight:bold;
}

.watch{
    background:#2563eb;
}

.download{
    background:#10b981;
}

</style>
</head>
<body>

<h2>🎬 Video Hub</h2>

<div class="tabs">
    <button onclick="loadVideos('latest')">
        Latest
    </button>

    <button onclick="loadVideos('trending')">
        Trending
    </button>
</div>

<div class="results" id="results"></div>

<script>

const API_URL =
"https://apis.davidcyril.name.ng/xxx/bokepnoz";

let apiData = null;

async function fetchData(){

    try{

        const response =
        await fetch(API_URL);

        const data =
        await response.json();

        apiData = data.data;

        loadVideos("latest");

    }catch(err){

        console.log(err);

        document.getElementById("results").innerHTML =
        "<p>Failed to load videos.</p>";

    }

}

function loadVideos(type){

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    apiData[type].forEach(video => {

        results.innerHTML += `

        <div class="card">

            <img src="${video.thumbnail}">

            <div class="content">

                <div class="title">
                    ${video.title}
                </div>

                <div class="meta">
                    ⏱ ${video.duration}
                    • 👁 ${video.views}
                </div>

                <div class="actions">

                    <a href="${video.url}"
                    target="_blank"
                    class="watch">

                    Watch

                    </a>

                    <a href="${video.url}"
                    download
                    class="download">

                    Download

                    </a>

                </div>

            </div>

        </div>

        `;

    });

}

fetchData();

</script>

</body>
</html>
